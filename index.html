<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>니케 소장품 강화 최적화 시뮬레이터</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="info-box">
            <h3>보유 비율</h3>
            <div class="kit-info">
                <div class="kit-card">
                    <div class="kit-card-header">
                        <span class="item-tag">ITEM</span>
                    </div>
                    <div class="kit-card-image">
                        <img src="src/beginner.png" alt="초급 관리키트">
                    </div>
                    <div class="kit-card-name">초심자용 관리 키트</div>
                    <div class="kit-card-stats">
                        <div class="kit-stat-row">
                            <span class="stat-label">경험치</span>
                            <span class="stat-value">200</span>
                        </div>
                        <div class="kit-stat-row">
                            <span class="stat-label">보유 비율</span>
                            <input type="number" id="supplyBasic" value="320" min="0" step="1">
                        </div>
                    </div>
                </div>
                <div class="kit-card">
                    <div class="kit-card-header">
                        <span class="item-tag">ITEM</span>
                    </div>
                    <div class="kit-card-image">
                        <img src="src/intermediate.png" alt="중급 관리키트">
                    </div>
                    <div class="kit-card-name">중급자용 관리 키트</div>
                    <div class="kit-card-stats">
                        <div class="kit-stat-row">
                            <span class="stat-label">경험치</span>
                            <span class="stat-value">500</span>
                        </div>
                        <div class="kit-stat-row">
                            <span class="stat-label">보유 비율</span>
                            <input type="number" id="supplyMedium" value="60" min="0" step="1">
                        </div>
                    </div>
                </div>
                <div class="kit-card">
                    <div class="kit-card-header">
                        <span class="item-tag">ITEM</span>
                    </div>
                    <div class="kit-card-image">
                        <img src="src/advanced.png" alt="상급 관리키트">
                    </div>
                    <div class="kit-card-name">상급자용 관리 키트</div>
                    <div class="kit-card-stats">
                        <div class="kit-stat-row">
                            <span class="stat-label">경험치</span>
                            <span class="stat-value">1000</span>
                        </div>
                        <div class="kit-stat-row">
                            <span class="stat-label">보유 비율</span>
                            <input type="number" id="supplyHigh" value="20" min="0" step="1">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>계산 모드</h3>
            <div class="mode-selector" role="group" aria-label="계산 모드 선택">
                <button type="button" class="mode-option is-active" data-mode="average" aria-pressed="true">
                    평균 최적화
                </button>
                <button type="button" class="mode-option" data-mode="coverage" aria-pressed="false">
                    커버리지
                </button>
            </div>
            <div id="modeHelp" class="mode-help" aria-live="polite"></div>
            <input type="hidden" id="solveMode" value="average">
        </div>

        <div class="section">
            <h3>강화 구간</h3>
            <div class="stage-mode-selector" role="group" aria-label="강화 구간 선택">
                <button type="button" class="stage-option is-active" data-stage-preset="5-15" aria-pressed="true">
                    5-15
                </button>
                <button type="button" class="stage-option" data-stage-preset="5-10" aria-pressed="false">
                    5-10
                </button>
                <button type="button" class="stage-option" data-stage-preset="10-15" aria-pressed="false">
                    10-15
                </button>
                <button type="button" class="stage-option" data-stage-preset="custom" aria-pressed="false">
                    커스텀
                </button>
            </div>
            <div id="stageHelp" class="stage-help" aria-live="polite"></div>
            <input type="hidden" id="stagePreset" value="5-15">

            <div id="customStageControls" class="stage-custom-controls" hidden>
                <div class="stage-field">
                    <label for="fromLevel">시작 단계</label>
                    <select id="fromLevel"></select>
                </div>
                <div class="stage-field">
                    <label for="toLevel">도착 단계</label>
                    <select id="toLevel"></select>
                </div>
            </div>

            <div class="stage-action-row">
                <button id="calculateBtn" class="btn-primary">조합 계산</button>
            </div>
        </div>

        <div class="section" id="resultsSection" style="display: none;">
            <h2 id="resultsTitle">5 → 15 최적 강화 경로</h2>
            <div id="summaryBox" class="summary-box"></div>
            <div id="topResults" class="top-results"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
